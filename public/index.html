<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>光流与频域洗白工作站</title>
    <style>
      :root {
        --theme-blue: #007aff;
        --theme-green: #34c759;
        --bg-color: #f2f2f7;
        --card-bg: #ffffff;
        --text-main: #1c1c1e;
        --text-muted: #8e8e93;
        --danger: #ff3b30;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container,
      .task-board {
        width: 100%;
        max-width: 420px;
      }

      .container {
        background: var(--card-bg);
        border-radius: 22px;
        padding: 28px 20px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        text-align: center;
        margin-bottom: 22px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }

      .subtitle {
        font-size: 14px;
        color: var(--text-muted);
        margin: 0 0 22px;
      }

      input[type="file"] {
        display: none;
      }

      .upload-area {
        display: block;
        border: 2px dashed #c7c7cc;
        border-radius: 14px;
        padding: 30px 18px;
        cursor: pointer;
        background: #fafafa;
        margin-bottom: 16px;
        transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
      }

      .upload-area.dragover {
        background: #e8f2ff;
        border-color: var(--theme-blue);
        transform: scale(1.02);
      }

      .upload-icon {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .file-name {
        font-size: 15px;
        color: var(--theme-blue);
        word-break: break-all;
      }

      .btn-submit,
      .btn-download,
      .btn-clear {
        border: none;
        cursor: pointer;
        font: inherit;
      }

      .btn-submit {
        width: 100%;
        border-radius: 12px;
        padding: 15px 16px;
        font-size: 17px;
        font-weight: 600;
        color: #fff;
        background: var(--theme-blue);
      }

      .btn-submit:disabled {
        opacity: 0.55;
      }

      .board-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 4px;
        margin-bottom: 14px;
      }

      .board-header h2 {
        font-size: 18px;
        margin: 0;
      }

      .btn-clear {
        color: var(--danger);
        background: transparent;
        font-size: 14px;
        font-weight: 600;
      }

      .task-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .task-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
      }

      .task-info {
        min-width: 0;
        flex: 1;
      }

      .task-name {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .task-meta {
        font-size: 12px;
        color: var(--text-muted);
      }

      .task-error {
        margin-top: 6px;
        font-size: 12px;
        color: var(--danger);
        line-height: 1.4;
      }

      .status-badge,
      .btn-download {
        white-space: nowrap;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 700;
      }

      .status-processing {
        background: #e5f1ff;
        color: var(--theme-blue);
      }

      .status-failed {
        background: #ffebee;
        color: var(--danger);
      }

      .btn-download {
        background: var(--theme-green);
        color: #fff;
        text-decoration: none;
      }

      .placeholder {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        padding: 18px 0;
      }
    </style>
  </head>
  <body>
    <section class="container">
      <h1>光流与频域洗白工作站</h1>
      <p class="subtitle">点击或直接拖拽视频 / 照片到虚线框内</p>

      <form id="uploadForm">
        <label for="fileInput" class="upload-area" id="dropZone">
          <div class="upload-icon">📸</div>
          <div class="file-name" id="fileNameDisplay">点击选择 或 拖拽文件到这里</div>
        </label>
        <input
          type="file"
          id="fileInput"
          name="file"
          accept="video/mp4,video/quicktime,image/jpeg,image/png,image/webp"
        />
        <button type="button" class="btn-submit" id="submitBtn">上传并处理</button>
      </form>
    </section>

    <section class="task-board">
      <div class="board-header">
        <h2>处理中心</h2>
        <button type="button" class="btn-clear" id="clearBtn">一键清理空间</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </section>

    <script>
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const fileNameDisplay = document.getElementById("fileNameDisplay");
      const submitBtn = document.getElementById("submitBtn");
      const clearBtn = document.getElementById("clearBtn");
      const taskList = document.getElementById("taskList");

      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add("dragover"), false);
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove("dragover"), false);
      });

      dropZone.addEventListener(
        "drop",
        (event) => {
          const files = event.dataTransfer?.files;
          if (files?.length) {
            fileInput.files = files;
            updateFileName();
          }
        },
        false,
      );

      fileInput.addEventListener("change", updateFileName);
      submitBtn.addEventListener("click", uploadMedia);
      clearBtn.addEventListener("click", clearTasks);

      function preventDefaults(event) {
        event.preventDefault();
        event.stopPropagation();
      }

      function updateFileName() {
        const file = fileInput.files?.[0];
        fileNameDisplay.textContent = file ? `已就绪: ${file.name}` : "点击选择 或 拖拽文件到这里";
      }

      async function uploadMedia() {
        const file = fileInput.files?.[0];
        if (!file) {
          alert("请先选择或拖入文件！");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "🚀 正在高速传输中...";

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("/upload", { method: "POST", body: formData });
          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.error || "上传失败");
          }

          submitBtn.textContent = "✅ 后台已接管处理";
          setTimeout(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = "上传并处理";
            fileInput.value = "";
            updateFileName();
            fetchTasks();
          }, 1200);
        } catch (error) {
          alert(error.message || "网络断开，请重试！");
          submitBtn.disabled = false;
          submitBtn.textContent = "上传并处理";
        }
      }

      function startDownload(filename) {
        const downloadUrl = `/download/${encodeURIComponent(filename)}`;
        const ua = navigator.userAgent.toLowerCase();

        if (ua.includes("micromessenger")) {
          alert("微信内置浏览器可能会拦截下载，请尝试在 Safari / Chrome 中打开。");
          return;
        }

        if (window.navigator.standalone === true) {
          window.open(downloadUrl, "_blank");
          return;
        }

        window.location.href = downloadUrl;
      }

      function renderTaskStatus(task) {
        if (task.status === "processing") {
          return '<span class="status-badge status-processing">底层破译中</span>';
        }
        if (task.status === "completed") {
          return `<button class="btn-download" data-file="${encodeURIComponent(task.output_file)}">获取成品</button>`;
        }
        return '<span class="status-badge status-failed">处理失败</span>';
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function fetchTasks() {
        try {
          const response = await fetch("/tasks");
          const tasks = await response.json();
          const entries = Object.entries(tasks);

          if (entries.length === 0) {
            taskList.innerHTML = '<div class="placeholder">暂无记录</div>';
            return;
          }

          taskList.innerHTML = entries
            .map(([, task]) => {
              const errorHtml = task.error
                ? `<div class="task-error">${escapeHtml(task.error)}</div>`
                : "";

              return `
                <article class="task-card">
                  <div class="task-info">
                    <div class="task-name">${escapeHtml(task.original_name)}</div>
                    <div class="task-meta">${escapeHtml(task.upload_time)} 提交 · ${task.kind === "image" ? "图片增强" : "视频转存"}</div>
                    ${errorHtml}
                  </div>
                  <div>${renderTaskStatus(task)}</div>
                </article>
              `;
            })
            .join("");

          taskList.querySelectorAll("[data-file]").forEach((button) => {
            button.addEventListener("click", () => startDownload(decodeURIComponent(button.dataset.file)));
          });
        } catch (error) {
          taskList.innerHTML = '<div class="placeholder">任务列表加载失败</div>';
          console.error(error);
        }
      }

      async function clearTasks() {
        if (!confirm("确定要清空列表吗？文件也会从本地删除。")) {
          return;
        }

        try {
          const response = await fetch("/clear_tasks", { method: "POST" });
          if (!response.ok) {
            throw new Error("清理失败");
          }
          fetchTasks();
        } catch (error) {
          alert(error.message || "清理失败，请稍后重试");
        }
      }

      fetchTasks();
      setInterval(fetchTasks, 3000);
    </script>
  </body>
</html>
